<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NU40 Light Viewer</title>
  <style>
    :root {
      --bg: rgb(128, 128, 128);
      --card: rgba(255,255,255,0.88);
      --text: #111827;
      --muted: #4b5563;
      --border: rgba(255,255,255,0.45);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background 0.25s ease;
      padding: 24px;
    }

    .card {
      width: min(560px, 100%);
      background: var(--card);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.18);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 30px;
    }

    p {
      margin: 0;
      line-height: 1.6;
      color: var(--muted);
    }

    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      background: #111827;
      color: white;
    }

    button.secondary {
      background: white;
      color: #111827;
      border: 1px solid #d1d5db;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 22px;
    }

    .panel {
      background: rgba(255,255,255,0.7);
      border-radius: 16px;
      padding: 16px;
      border: 1px solid rgba(255,255,255,0.55);
    }

    .label {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .value {
      font-size: 28px;
      font-weight: 700;
    }

    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      word-break: break-all;
      font-size: 13px;
    }

    .log {
      margin-top: 18px;
      background: rgba(17,24,39,0.92);
      color: #e5e7eb;
      border-radius: 16px;
      padding: 14px;
      min-height: 120px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 13px;
      overflow: auto;
      white-space: pre-wrap;
    }

    .badge {
      display: inline-block;
      margin-top: 12px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.65);
      font-size: 13px;
      color: #1f2937;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>NU40 조도 센서 뷰어</h1>
    <p>브라우저가 NU40 BLE 장치에 연결되면, 받은 조도 값에 따라 페이지 배경색이 밝아지거나 어두워집니다.</p>

    <div class="row">
      <button id="connectBtn">BLE 연결</button>
      <button id="disconnectBtn" class="secondary">연결 해제</button>
    </div>

    <div class="badge" id="status">상태: 대기 중</div>

    <div class="grid">
      <section class="panel">
        <div class="label">최근 조도 값</div>
        <div class="value" id="lightValue">-</div>
      </section>
      <section class="panel">
        <div class="label">현재 배경색</div>
        <div class="value mono" id="colorValue">rgb(128, 128, 128)</div>
      </section>
    </div>

    <div class="log" id="log">로그가 여기에 표시됩니다.</div>
  </main>

  <script>
    const connectBtn = document.getElementById('connectBtn');
    const disconnectBtn = document.getElementById('disconnectBtn');
    const statusEl = document.getElementById('status');
    const lightValueEl = document.getElementById('lightValue');
    const colorValueEl = document.getElementById('colorValue');
    const logEl = document.getElementById('log');

    const NUS_SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
    const NUS_TX_UUID = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';

    let device = null;
    let server = null;
    let characteristic = null;
    let textDecoder = new TextDecoder();
    let buffer = '';

    function log(message) {
      const time = new Date().toLocaleTimeString();
      logEl.textContent += `\n[${time}] ${message}`;
      logEl.scrollTop = logEl.scrollHeight;
    }

    function setStatus(message) {
      statusEl.textContent = `상태: ${message}`;
    }

    function updateBackground(lightValue) {
      const clamped = Math.max(0, Math.min(1023, lightValue));
      const brightness = Math.round((clamped / 1023) * 255);
      const color = `rgb(${brightness}, ${brightness}, ${brightness})`;
      document.body.style.background = color;
      colorValueEl.textContent = color;
      lightValueEl.textContent = String(lightValue);
    }

    function handleLine(line) {
      const trimmed = line.trim();
      if (!trimmed) return;
      log(`수신: ${trimmed}`);

      const match = trimmed.match(/(\d+)/);
      if (!match) return;

      const lightValue = Number(match[1]);
      if (!Number.isNaN(lightValue)) {
        updateBackground(lightValue);
      }
    }

    function handleNotifications(event) {
      const chunk = textDecoder.decode(event.target.value);
      buffer += chunk;

      let newlineIndex;
      while ((newlineIndex = buffer.indexOf('\n')) !== -1) {
        const line = buffer.slice(0, newlineIndex);
        buffer = buffer.slice(newlineIndex + 1);
        handleLine(line);
      }
    }

    async function connectBLE() {
      if (!navigator.bluetooth) {
        alert('이 브라우저는 Web Bluetooth를 지원하지 않습니다. Chrome 또는 Edge에서 열어보세요.');
        return;
      }

      try {
        setStatus('장치 선택 중');
        log('BLE 장치 선택 창을 엽니다.');

        device = await navigator.bluetooth.requestDevice({
          filters: [{ namePrefix: 'NU40' }],
          optionalServices: [NUS_SERVICE_UUID]
        });

        device.addEventListener('gattserverdisconnected', onDisconnected);

        setStatus('연결 중');
        server = await device.gatt.connect();
        const service = await server.getPrimaryService(NUS_SERVICE_UUID);
        characteristic = await service.getCharacteristic(NUS_TX_UUID);
        await characteristic.startNotifications();
        characteristic.addEventListener('characteristicvaluechanged', handleNotifications);

        setStatus(`${device.name} 연결됨`);
        log(`${device.name} 에 연결되었습니다.`);
      } catch (error) {
        setStatus('연결 실패');
        log(`오류: ${error.message}`);
      }
    }

    function onDisconnected() {
      setStatus('연결 끊김');
      log('장치 연결이 끊어졌습니다.');
    }

    async function disconnectBLE() {
      try {
        if (characteristic) {
          characteristic.removeEventListener('characteristicvaluechanged', handleNotifications);
        }
        if (device?.gatt?.connected) {
          device.gatt.disconnect();
        }
        setStatus('연결 해제됨');
        log('사용자가 연결을 해제했습니다.');
      } catch (error) {
        log(`해제 오류: ${error.message}`);
      }
    }

    connectBtn.addEventListener('click', connectBLE);
    disconnectBtn.addEventListener('click', disconnectBLE);
    log('페이지 준비 완료');
  </script>
</body
